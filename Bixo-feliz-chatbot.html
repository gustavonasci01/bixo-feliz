<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bixo Feliz — Assistente Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec;
    --warm-white: #fffaf4;
    --sage: #7a9e7e;
    --sage-dark: #5a7d5e;
    --sage-light: #c4dbc6;
    --terracotta: #c97d4e;
    --terracotta-light: #f0c4a0;
    --brown: #4a3728;
    --brown-light: #8b6f5e;
    --text: #2d2218;
    --text-muted: #7a6358;
    --bubble-user: #7a9e7e;
    --bubble-bot: #ffffff;
    --shadow: 0 4px 24px rgba(74,55,40,0.10);
    --shadow-strong: 0 8px 40px rgba(74,55,40,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(122,158,126,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(201,125,78,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(196,219,198,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Decorative paw prints */
  .paw-bg {
    position: fixed;
    font-size: 80px;
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
    user-select: none;
  }
  .paw-bg:nth-child(1) { top: 5%; left: 3%; transform: rotate(-20deg); font-size: 120px; }
  .paw-bg:nth-child(2) { top: 60%; left: 90%; transform: rotate(15deg); font-size: 90px; }
  .paw-bg:nth-child(3) { top: 80%; left: 5%; transform: rotate(30deg); font-size: 70px; }
  .paw-bg:nth-child(4) { top: 15%; left: 85%; transform: rotate(-10deg); font-size: 100px; }

  .app-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    height: 100vh;
    max-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 24px;
    background: var(--warm-white);
    border-radius: 20px 20px 0 0;
    border-bottom: 1px solid rgba(122,158,126,0.15);
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }

  .header-avatar {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--sage), var(--sage-dark));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(90,125,94,0.35);
  }

  .header-info { flex: 1; }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--brown);
    line-height: 1.2;
  }

  .header-subtitle {
    font-size: 12.5px;
    color: var(--text-muted);
    font-weight: 300;
    margin-top: 1px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--sage-dark);
    font-weight: 500;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: var(--sage);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    background: var(--warm-white);
    padding: 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--sage-light) transparent;
    min-height: 0;
  }

  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--sage-light); border-radius: 10px; }

  /* Date divider */
  .date-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0 8px;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(122,158,126,0.2);
  }
  .date-divider span {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* Messages */
  .message-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: msg-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .msg-avatar.bot {
    background: linear-gradient(135deg, var(--sage), var(--sage-dark));
    box-shadow: 0 2px 8px rgba(90,125,94,0.3);
  }

  .msg-avatar.user {
    background: linear-gradient(135deg, var(--terracotta), #a8623c);
    box-shadow: 0 2px 8px rgba(201,125,78,0.3);
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--text);
    position: relative;
  }

  .bubble.bot {
    background: var(--bubble-bot);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(122,158,126,0.12);
  }

  .bubble.user {
    background: var(--bubble-user);
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 3px 12px rgba(90,125,94,0.3);
  }

  .bubble-time {
    font-size: 10.5px;
    color: var(--text-muted);
    margin-top: 4px;
    text-align: right;
  }

  .bubble.user + .bubble-time, .message-row.user .bubble-time {
    text-align: right;
    color: rgba(255,255,255,0.65);
    margin-top: 4px;
  }

  .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
  .message-row.user .msg-wrapper { align-items: flex-end; }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .typing-bubble {
    background: var(--bubble-bot);
    border: 1px solid rgba(122,158,126,0.12);
    box-shadow: var(--shadow);
    padding: 14px 18px;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--sage);
    border-radius: 50%;
    animation: bounce 1.3s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 4px 0 2px 42px;
    animation: msg-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
  }

  .quick-reply-btn {
    background: var(--warm-white);
    border: 1.5px solid var(--sage-light);
    color: var(--sage-dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .quick-reply-btn:hover {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(90,125,94,0.3);
  }

  /* Input area */
  .input-area {
    background: var(--warm-white);
    padding: 14px 16px;
    border-radius: 0 0 20px 20px;
    border-top: 1px solid rgba(122,158,126,0.15);
    box-shadow: 0 -2px 20px rgba(74,55,40,0.06);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #userInput {
    flex: 1;
    background: var(--cream);
    border: 1.5px solid rgba(122,158,126,0.25);
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--brown-light); opacity: 0.6; }
  #userInput:focus {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(122,158,126,0.12);
  }

  .send-btn {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--sage), var(--sage-dark));
    border: none;
    border-radius: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(90,125,94,0.35);
  }

  .send-btn:hover { transform: translateY(-1px) scale(1.04); box-shadow: 0 5px 16px rgba(90,125,94,0.45); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 20px; height: 20px; fill: white; }

  .input-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: center;
    opacity: 0.7;
  }

  /* Info section inside bot bubble */
  .info-card {
    background: rgba(122,158,126,0.08);
    border-left: 3px solid var(--sage);
    border-radius: 0 8px 8px 0;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 13px;
  }

  .info-card strong { color: var(--sage-dark); display: block; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Error bubble */
  .bubble.error {
    background: #fff0eb;
    border: 1px solid rgba(201,125,78,0.2);
    color: var(--terracotta);
  }
</style>
</head>
<body>

<div class="paw-bg">🐾</div>
<div class="paw-bg">🐾</div>
<div class="paw-bg">🐾</div>
<div class="paw-bg">🐾</div>

<div class="app-container">
  <div class="header">
    <div class="header-avatar">🐾</div>
    <div class="header-info">
      <div class="header-title">Clínica Bixo Feliz</div>
      <div class="header-subtitle">Assistente Virtual · Veterinária & Informações</div>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="date-divider"><span>Hoje</span></div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Digite sua pergunta sobre a clínica ou seu pet..."></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Pressione Enter para enviar · Shift+Enter para nova linha</div>
  </div>
</div>

<script>
const CLINIC_SYSTEM_PROMPT = `Você é o assistente virtual da Clínica Veterinária **Bixo Feliz**, uma clínica dedicada ao bem-estar e saúde de animais de estimação.

## Informações da Clínica Bixo Feliz:
- **Nome:** Clínica Veterinária Bixo Feliz
- **Especialidade:** Medicina veterinária para pequenos animais (cães, gatos, aves, roedores)
- **Endereço:** Rua das Flores, 342 – Jardim Primavera, São Paulo – SP
- **Telefone:** (11) 3456-7890 | WhatsApp: (11) 94567-8901
- **Horários:** Segunda a Sexta: 8h–20h | Sábado: 8h–17h | Domingo: 10h–14h (emergências)
- **E-mail:** contato@bixofeliz.com.br
- **Site:** www.bixofeliz.com.br

## Serviços Oferecidos:
- Consultas clínicas gerais e especializadas
- Vacinação (V8, V10, antirrábica, gripe felina, etc.)
- Cirurgias (castração, ortopédicas, dentárias, tumores)
- Exames laboratoriais e de imagem (ultrassom, raio-x)
- Internação 24h com monitoramento
- Petshop e banho & tosa integrados
- Atendimento de emergência
- Microchipagem e identificação
- Consultas de nutrição e dieta
- Dermatologia veterinária
- Cardiologia veterinária
- Oncologia veterinária

## Equipe Médica:
- **Dra. Ana Paula Meireles** – Clínica Geral e Medicina Felina (CRMV-SP 12345)
- **Dr. Lucas Ferreira** – Cirurgia e Ortopedia (CRMV-SP 23456)
- **Dra. Camila Santos** – Dermatologia e Nutrição (CRMV-SP 34567)
- **Dr. Rafael Nunes** – Cardiologia e Medicina de Emergência (CRMV-SP 45678)

## Preços Aproximados (sujeitos a alteração):
- Consulta clínica: R$ 180 – R$ 250
- Vacinas: R$ 80 – R$ 150 (dependendo da vacina)
- Castração cão macho: a partir de R$ 600
- Castração cão fêmea: a partir de R$ 900
- Castração gato macho: a partir de R$ 400
- Castração gato fêmea: a partir de R$ 600
- Banho e tosa: a partir de R$ 60 (conforme porte)
- Consulta de retorno: R$ 100

## Agendamento:
Consultas podem ser agendadas por telefone, WhatsApp ou pelo site.

---

## REGRAS IMPORTANTES PARA SUA CONDUTA:
1. **Responda APENAS** sobre:
   - A Clínica Bixo Feliz (serviços, horários, preços, equipe, agendamento, localização)
   - Dúvidas e orientações veterinárias gerais (saúde animal, doenças, vacinas, cuidados, alimentação, comportamento)
2. **NÃO responda** sobre outros assuntos (política, receitas culinárias, tecnologia, etc.). Se perguntado sobre outro tema, redirecione gentilmente.
3. **Não diagnostique** doenças com certeza absoluta — oriente o tutor a consultar um veterinário da clínica.
4. Seja **caloroso, empático e profissional**, como se estivesse falando com um tutor preocupado com seu pet.
5. Sempre que pertinente, **convide o tutor a agendar uma consulta** ou ligar para a clínica.
6. Use **linguagem simples e acessível**, mas com autoridade profissional.
7. Suas respostas devem ser **concisas mas completas** — evite textos muito longos sem necessidade.
8. Responda sempre em **português brasileiro**.`;

let conversationHistory = [];
let isTyping = false;

function getTime() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function appendMessage(role, text, isError = false) {
  const chatArea = document.getElementById('chatArea');
  
  const row = document.createElement('div');
  row.className = `message-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role}`;
  avatar.textContent = role === 'bot' ? '🐾' : '👤';

  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}${isError ? ' error' : ''}`;
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  const time = document.createElement('div');
  time.className = 'bubble-time';
  time.textContent = getTime();

  wrapper.appendChild(bubble);
  wrapper.appendChild(time);
  row.appendChild(avatar);
  row.appendChild(wrapper);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;

  return bubble;
}

function showQuickReplies(options) {
  const chatArea = document.getElementById('chatArea');
  const container = document.createElement('div');
  container.className = 'quick-replies';
  container.id = 'quickReplies';

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quick-reply-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      container.remove();
      document.getElementById('userInput').value = opt;
      sendMessage();
    };
    container.appendChild(btn);
  });

  chatArea.appendChild(container);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'typing-indicator';
  row.id = 'typingIndicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar bot';
  avatar.textContent = '🐾';

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || isTyping) return;

  // Remove quick replies if visible
  const qr = document.getElementById('quickReplies');
  if (qr) qr.remove();

  appendMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  conversationHistory.push({ role: 'user', content: text });

  isTyping = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: CLINIC_SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();

    if (data.error) {
      throw new Error(data.error.message || 'Erro na API');
    }

    const botReply = data.content?.map(b => b.text || '').join('') || 'Desculpe, não consegui processar sua mensagem.';
    conversationHistory.push({ role: 'assistant', content: botReply });

    hideTyping();
    appendMessage('bot', botReply);

  } catch (err) {
    hideTyping();
    console.error(err);
    appendMessage('bot', '⚠️ Ops! Houve um problema ao conectar. Tente novamente em instantes ou ligue para **(11) 3456-7890**.', true);
    conversationHistory.pop();
  }

  isTyping = false;
  sendBtn.disabled = false;
  input.focus();
}

// Auto-resize textarea
document.getElementById('userInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Enter to send
document.getElementById('userInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Welcome message
window.addEventListener('load', () => {
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      hideTyping();
      appendMessage('bot', '🐾 Olá! Seja bem-vindo(a) à **Clínica Bixo Feliz**!\n\nSou o assistente virtual da clínica e estou aqui para ajudar com dúvidas sobre nossos serviços, horários, equipe médica e também com orientações veterinárias gerais.\n\nComo posso te ajudar hoje? 😊');

      setTimeout(() => {
        showQuickReplies([
          '📅 Quero agendar consulta',
          '⏰ Horários de atendimento',
          '💉 Quais vacinas preciso?',
          '✂️ Preço da castração',
          '📍 Onde fica a clínica?',
          '🚨 Emergência veterinária'
        ]);
      }, 300);
    }, 1400);
  }, 500);
});
</script>
</body>
</html>
